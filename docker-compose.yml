services:
  plan-manager:
    build: .
    container_name: sentinel-plan-manager
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      # Your 12/24-word mnemonic. Compose auto-loads a `.env` file in this
      # directory (use `MNEMONIC=...` there) or pass it inline. Leave unset to
      # create a wallet through the web UI on first boot.
      MNEMONIC: ${MNEMONIC:-}
      PORT: 3003
    volumes:
      # Single named volume for all persistent state. The app writes
      # .wallet.json, my-plans.json, and nodes-cache.json under /data.
      - plan-manager-data:/data

volumes:
  plan-manager-data:
